name: Poimandres Offline Vault
on: workflow_dispatch

jobs:
  build-docs:
    strategy:
      fail-fast: false # Keep going even if one library fails
      matrix:
        include:
          - id: r3f
            path: 'docs/react-three-fiber'
            name: 'React Three Fiber'
          - id: drei
            path: 'docs/drei'
            name: 'Drei'
          - id: zustand
            path: 'docs/zustand'
            name: 'Zustand'
          - id: postprocessing
            path: 'docs/react-postprocessing'
            name: 'Postprocessing'
          - id: jotai
            path: 'docs/jotai'
            name: 'Jotai'
          - id: valtio
            path: 'docs/valtio'
            name: 'Valtio'
          - id: cannon
            path: 'docs/react-three-cannon'
            name: 'Cannon'

    uses: ./.github/workflows/build.yml
    with:
      mdx: ${{ matrix.path }}
      libname: ${{ matrix.name }}
      libname_short: ${{ matrix.id }}
      base_path: '/${{ matrix.id }}'
      home_redirect: '/getting-started/introduction' # Added the missing required input

  combine:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./vault
          pattern: github-pages*

      - name: Zip Everything
        run: |
          cd vault
          zip -r ../pmndrs-complete-docs.zip .

      - name: Upload Final Vault
        uses: actions/upload-artifact@v4
        with:
          name: PMNDRS-OFFLINE-FULL
          path: pmndrs-complete-docs.zip
