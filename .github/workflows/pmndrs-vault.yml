name: Build PMNDRS Docs (The Right Way)
on: workflow_dispatch

jobs:
  build-offline-docs:
    runs-on: ubuntu-latest
    steps:
      # 1. Download the Next.js Docs Engine
      - name: Checkout Docs Engine
        uses: actions/checkout@v4
        with:
          repository: pmndrs/docs
          path: engine

      # 2. Download Content Repos
      - name: Checkout R3F
        uses: actions/checkout@v4
        with:
          repository: pmndrs/react-three-fiber
          path: content-r3f

      - name: Checkout Drei
        uses: actions/checkout@v4
        with:
          repository: pmndrs/drei
          path: content-drei

      - name: Checkout Zustand
        uses: actions/checkout@v4
        with:
          repository: pmndrs/zustand
          path: content-zustand

      - name: Checkout Leva
        uses: actions/checkout@v4
        with:
          repository: pmndrs/leva
          path: content-leva

      - name: Checkout Rapier
        uses: actions/checkout@v4
        with:
          repository: pmndrs/react-three-rapier
          path: content-rapier

      # 3. Setup Node Environment
      - name: Setup Node & pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: engine/pnpm-lock.yaml

      # 4. Build Everything Sequentially
      - name: Build All Libraries
        run: |
          cd engine
          pnpm install
          
          # Global variables the engine needs
          export OUTPUT=export
          export HOME_REDIRECT=/getting-started/introduction
          export NEXT_PUBLIC_URL="http://localhost:8080"
          
          # Build R3F
          export MDX=$GITHUB_WORKSPACE/content-r3f/docs
          export NEXT_PUBLIC_LIBNAME="React Three Fiber"
          export BASE_PATH="/r3f"
          pnpm build && mv out ../out-r3f

          # Build Drei
          export MDX=$GITHUB_WORKSPACE/content-drei/docs
          export NEXT_PUBLIC_LIBNAME="Drei"
          export BASE_PATH="/drei"
          pnpm build && mv out ../out-drei

          # Build Zustand
          export MDX=$GITHUB_WORKSPACE/content-zustand/docs
          export NEXT_PUBLIC_LIBNAME="Zustand"
          export BASE_PATH="/zustand"
          pnpm build && mv out ../out-zustand

          # Build Leva
          export MDX=$GITHUB_WORKSPACE/content-leva/docs
          export NEXT_PUBLIC_LIBNAME="Leva"
          export BASE_PATH="/leva"
          pnpm build && mv out ../out-leva

          # Build Rapier
          export MDX=$GITHUB_WORKSPACE/content-rapier/docs
          export NEXT_PUBLIC_LIBNAME="Rapier"
          export BASE_PATH="/rapier"
          pnpm build && mv out ../out-rapier

      # 5. Give you the Unified ZIP
      - name: Upload Final Vault
        uses: actions/upload-artifact@v4
        with:
          name: PMNDRS-Mega-Vault
          path: |
            out-r3f/
            out-drei/
            out-zustand/
            out-leva/
            out-rapier/
