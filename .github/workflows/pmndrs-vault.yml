name: Poimandres Offline Vault
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: r3f
            path: 'docs/react-three-fiber'
          - id: drei
            path: 'docs/drei'
          - id: zustand
            path: 'docs/zustand'
          - id: postprocessing
            path: 'docs/react-postprocessing'
          - id: jotai
            path: 'docs/jotai'
          - id: valtio
            path: 'docs/valtio'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install

      - name: Build Library Docs
        # We manually set the variables their Docker image usually sets
        run: pnpm build
        env:
          MDX: ${{ matrix.path }}
          NEXT_PUBLIC_LIBNAME: ${{ matrix.id }}
          BASE_PATH: '/${{ matrix.id }}'
          OUTPUT: 'export'
          HOME_REDIRECT: '/getting-started/introduction'

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.id }}
          path: out/ # Standard Next.js export folder
